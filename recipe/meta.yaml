{% set python_min = '3.11.0' %}
{% set name = "knapsack" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/knapsack-{{ version }}.tar.gz
  sha256: 816930e06a19880c50edba40b168112bcb0b32404e1684122b03ad86555bac58

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0.0

test:
  imports:
    - knapsack
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/SaitoTsutomu/knapsack
  summary: '`knapsack` is a package for for solving knapsack problem.'
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - julian-belina
